<!DOCTYPE html>
<html>
    <head>
        <title>Calculator</title>
        <meta charset="utf-8">
    </head>
    <body>
        <h1>Calculadora de Antonio Monge</h1>
        Number:
        <input type="text" id="n1">
        <p>
            <button onclick="cube()"> x^3 </button>
            <button onclick="power_4()"> x^4</button>
        </p>
        <script type="text/javascript">
            function cube() {
                var num = document.getElementById("n1");
                // Convertir el valor a número y calcular el cubo
                var result = Math.pow(Number(num.value), 3);
                // Asignar el resultado de vuelta al campo de entrada
                num.value = result;
            }
            function power_4() {
                var num = document.getElementById("n1");
                // Convertir el valor a número y calcular la potencia 4
                var result = Math.pow(Number(num.value), 4);
                // Asignar el resultado de vuelta al campo de entrada
                num.value = result;
            }
        </script>
    </body>
</html>
